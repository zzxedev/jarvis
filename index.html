<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>J.A.R.V.I.S.</title>
<style>
  :root {
    --void: #04070a;
    --panel: #070d12;
    --cyan: #4fd8e8;
    --cyan-dim: #1c5a63;
    --amber: #e8a23a;
    --text: #cdeef2;
    --text-dim: #5c8a90;
    --danger: #e85a4f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--void);
    color: var(--text);
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  body {
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(79,216,232,0.06), transparent 60%),
      repeating-linear-gradient(0deg, rgba(79,216,232,0.025) 0px, rgba(79,216,232,0.025) 1px, transparent 1px, transparent 3px);
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1px solid var(--cyan-dim);
    opacity: 0.6;
  }
  .corner.tl { top: 16px; left: 16px; border-right: none; border-bottom: none; }
  .corner.tr { top: 16px; right: 16px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 16px; left: 16px; border-right: none; border-top: none; }
  .corner.br { bottom: 16px; right: 16px; border-left: none; border-top: none; }

  .header {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    letter-spacing: 6px;
    font-size: 13px;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(79,216,232,0.5);
  }
  .header .sub {
    margin-top: 6px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  .core-wrap {
    position: relative;
    width: 340px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg.rings { position: absolute; width: 100%; height: 100%; }

  .ring {
    fill: none;
    stroke: var(--cyan-dim);
    stroke-width: 1;
    transform-origin: 170px 170px;
  }
  .ring.active { stroke: var(--cyan); filter: drop-shadow(0 0 4px rgba(79,216,232,0.6)); }
  .ring.spin-slow { animation: spin 18s linear infinite; }
  .ring.spin-rev { animation: spin 24s linear infinite reverse; }
  .ring.spin-fast { animation: spin 9s linear infinite; }
  .ring.dash { stroke-dasharray: 3 6; }

  body.listening .ring { stroke: var(--amber); }
  body.listening .ring.active { stroke: var(--amber); filter: drop-shadow(0 0 6px rgba(232,162,58,0.7)); }
  body.error .ring { stroke: var(--danger) !important; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .core {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 45%, rgba(79,216,232,0.35), rgba(79,216,232,0.03) 65%, transparent 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }
  body.listening .core { background: radial-gradient(circle at 50% 45%, rgba(232,162,58,0.4), rgba(232,162,58,0.04) 65%, transparent 75%); }
  body.speaking .core { animation: pulseCore 0.9s ease-in-out infinite; }
  @keyframes pulseCore { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

  .bars {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 60px;
  }
  .bars span {
    display: block;
    width: 3px;
    height: 8px;
    background: var(--cyan);
    box-shadow: 0 0 6px rgba(79,216,232,0.7);
    border-radius: 2px;
    transition: height 0.12s ease;
  }
  body.listening .bars span { background: var(--amber); box-shadow: 0 0 6px rgba(232,162,58,0.7); }

  .status {
    margin-top: 30px;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    min-height: 16px;
    text-align: center;
  }
  body.listening .status { color: var(--amber); }
  body.speaking .status { color: var(--cyan); }
  body.error .status { color: var(--danger); }

  .transcript {
    margin-top: 22px;
    width: min(560px, 90vw);
    min-height: 70px;
    max-height: 160px;
    overflow-y: auto;
    border-left: 1px solid var(--cyan-dim);
    padding: 8px 0 8px 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--cyan-dim); }

  .line { margin-bottom: 10px; opacity: 0; animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
  .line .who { color: var(--cyan); letter-spacing: 2px; font-size: 10px; }
  .line.user .who { color: var(--amber); }
  .line .txt { color: var(--text); }

  .controls {
    position: absolute;
    bottom: 50px;
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1px solid var(--cyan);
    background: rgba(79,216,232,0.05);
    color: var(--cyan);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .mic-btn:hover { background: rgba(79,216,232,0.15); box-shadow: 0 0 16px rgba(79,216,232,0.4); }
  .mic-btn.on { border-color: var(--amber); color: var(--amber); background: rgba(232,162,58,0.12); box-shadow: 0 0 16px rgba(232,162,58,0.5); }
  .mic-btn svg { width: 26px; height: 26px; }

  .hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    max-width: 220px;
  }

  .unsupported {
    text-align: center;
    color: var(--danger);
    font-size: 12px;
    letter-spacing: 2px;
    max-width: 420px;
    line-height: 1.8;
  }

  .toggle-mute {
    position: absolute;
    top: 28px;
    right: 36px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border: 1px solid var(--cyan-dim);
    padding: 6px 10px;
    cursor: pointer;
    background: transparent;
  }
  .toggle-mute:hover { color: var(--cyan); border-color: var(--cyan); }
  .toggle-mute.active { color: var(--amber); border-color: var(--amber); }
</style>
</head>
<body>

<div class="stage">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="header">J . A . R . V . I . S .<div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div></div>

  <button class="toggle-mute" id="muteBtn">VOIX: ON</button>
  <button class="toggle-mute" id="keyBtn" style="right: 150px;">CLÉ API</button>

  <div id="keyModal" style="display:none; position:absolute; inset:0; background:rgba(4,7,10,0.92); z-index:50; align-items:center; justify-content:center; flex-direction:column;">
    <div style="border:1px solid var(--cyan-dim); padding:30px; width:min(420px,85vw); background:var(--panel);">
      <div style="letter-spacing:3px; font-size:12px; color:var(--cyan); margin-bottom:14px;">CLÉ API ANTHROPIC</div>
      <div style="font-size:10px; color:var(--text-dim); line-height:1.6; margin-bottom:14px;">
        Votre clé est stockée uniquement dans ce navigateur (localStorage), jamais envoyée ailleurs qu'à api.anthropic.com.
      </div>
      <input id="keyInput" type="password" placeholder="sk-ant-..." style="width:100%; background:var(--void); border:1px solid var(--cyan-dim); color:var(--text); padding:10px; font-family:inherit; font-size:12px; margin-bottom:14px;">
      <div style="display:flex; gap:10px;">
        <button id="keySave" style="flex:1; background:rgba(79,216,232,0.1); border:1px solid var(--cyan); color:var(--cyan); padding:10px; cursor:pointer; letter-spacing:2px; font-size:10px;">ENREGISTRER</button>
        <button id="keyClose" style="flex:1; background:transparent; border:1px solid var(--text-dim); color:var(--text-dim); padding:10px; cursor:pointer; letter-spacing:2px; font-size:10px;">FERMER</button>
      </div>
    </div>
  </div>

  <div class="core-wrap" id="coreWrap">
    <svg class="rings" viewBox="0 0 340 340">
      <circle class="ring spin-slow" cx="170" cy="170" r="160" />
      <circle class="ring spin-rev dash active" cx="170" cy="170" r="130" />
      <circle class="ring spin-fast" cx="170" cy="170" r="100" />
    </svg>
    <div class="core">
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <div class="status" id="status">SYSTÈME EN VEILLE</div>

  <div class="transcript" id="transcript"></div>

  <div class="controls" id="controls">
    <button class="mic-btn" id="micBtn" title="Activer le micro">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="hint">APPUYEZ ET PARLEZ<br>JARVIS VOUS RÉPONDRA À VOIX HAUTE</div>
  </div>
</div>

<script>
(function() {
  const body = document.body;
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const micBtn = document.getElementById('micBtn');
  const barsEl = document.getElementById('bars');
  const muteBtn = document.getElementById('muteBtn');
  const controls = document.getElementById('controls');
  const coreWrap = document.getElementById('coreWrap');

  // Build bar visualizer elements
  const BAR_COUNT = 20;
  for (let i = 0; i < BAR_COUNT; i++) {
    const s = document.createElement('span');
    barsEl.appendChild(s);
  }
  const barNodes = barsEl.querySelectorAll('span');

  let voiceEnabled = true;
  let idleAnimFrame = null;
  let conversation = [];

  // ---- API key management ----
  const keyModal = document.getElementById('keyModal');
  const keyInput = document.getElementById('keyInput');
  const keyBtn = document.getElementById('keyBtn');
  const keySave = document.getElementById('keySave');
  const keyClose = document.getElementById('keyClose');

  function getApiKey() {
    return localStorage.getItem('jarvis_api_key') || '';
  }
  function openKeyModal() {
    keyInput.value = getApiKey();
    keyModal.style.display = 'flex';
  }
  function closeKeyModal() {
    keyModal.style.display = 'none';
  }
  keyBtn.addEventListener('click', openKeyModal);
  keyClose.addEventListener('click', closeKeyModal);
  keySave.addEventListener('click', () => {
    localStorage.setItem('jarvis_api_key', keyInput.value.trim());
    closeKeyModal();
    setStatus('CLÉ ENREGISTRÉE');
    setTimeout(() => setStatus('SYSTÈME EN VEILLE'), 1500);
  });

  // Prompt for key on first load if missing
  window.addEventListener('load', () => {
    if (!getApiKey()) openKeyModal();
  });
  const SYSTEM_PROMPT = "Tu es J.A.R.V.I.S., l'assistant vocal personnel inspiré d'Iron Man. Réponds en français, de façon concise (2-4 phrases maximum sauf si on te demande des détails), avec un ton calme, courtois, légèrement formel et subtilement spirituel. Ne mentionne jamais que tu es un modèle de langage ; reste dans le personnage de Jarvis.";

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function addLine(who, text) {
    const div = document.createElement('div');
    div.className = 'line ' + (who === 'Vous' ? 'user' : 'jarvis');
    div.innerHTML = '<div class="who">' + who + '</div><div class="txt"></div>';
    div.querySelector('.txt').textContent = text;
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  function animateBarsIdle() {
    barNodes.forEach((b, i) => {
      const h = 8 + Math.abs(Math.sin(Date.now() / 600 + i)) * 10;
      b.style.height = h + 'px';
    });
    idleAnimFrame = requestAnimationFrame(animateBarsIdle);
  }
  animateBarsIdle();

  // ---- Speech Recognition setup ----
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let listening = false;

  if (!SpeechRecognition) {
    controls.innerHTML = '<div class="unsupported">RECONNAISSANCE VOCALE NON DISPONIBLE<br>SUR CE NAVIGATEUR.<br>ESSAYEZ AVEC GOOGLE CHROME.</div>';
    setStatus('MODULE INDISPONIBLE');
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      listening = true;
      body.classList.remove('error');
      body.classList.add('listening');
      micBtn.classList.add('on');
      setStatus('J\'ÉCOUTE...');
    };

    recognition.onend = () => {
      listening = false;
      body.classList.remove('listening');
      micBtn.classList.remove('on');
      if (!body.classList.contains('speaking')) setStatus('SYSTÈME EN VEILLE');
    };

    recognition.onerror = (e) => {
      listening = false;
      body.classList.remove('listening');
      micBtn.classList.remove('on');
      body.classList.add('error');
      let msg = 'ERREUR DE CAPTURE AUDIO';
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        msg = 'ACCÈS AU MICROPHONE REFUSÉ';
      } else if (e.error === 'no-speech') {
        msg = 'AUCUNE PAROLE DÉTECTÉE';
      }
      setStatus(msg);
      setTimeout(() => { body.classList.remove('error'); setStatus('SYSTÈME EN VEILLE'); }, 2500);
    };

    recognition.onresult = (e) => {
      const said = e.results[0][0].transcript;
      addLine('Vous', said);
      askJarvis(said);
    };

    micBtn.addEventListener('click', () => {
      if (listening) {
        recognition.stop();
        return;
      }
      // stop any ongoing speech before listening
      window.speechSynthesis.cancel();
      body.classList.remove('speaking');
      try {
        recognition.start();
      } catch (err) {
        // already started edge case
      }
    });
  }

  muteBtn.addEventListener('click', () => {
    voiceEnabled = !voiceEnabled;
    muteBtn.textContent = 'VOIX: ' + (voiceEnabled ? 'ON' : 'OFF');
    muteBtn.classList.toggle('active', !voiceEnabled);
    if (!voiceEnabled) window.speechSynthesis.cancel();
  });

  // ---- Speak with Web Speech Synthesis, animate bars to amplitude-ish pattern ----
  function speak(text) {
    if (!voiceEnabled || !window.speechSynthesis) {
      setStatus('SYSTÈME EN VEILLE');
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'fr-FR';
    utter.rate = 1.0;
    utter.pitch = 0.85;

    const voices = window.speechSynthesis.getVoices();
    const frVoice = voices.find(v => v.lang === 'fr-FR' && /male|homme/i.test(v.name)) ||
                    voices.find(v => v.lang === 'fr-FR') ||
                    voices.find(v => v.lang && v.lang.startsWith('fr'));
    if (frVoice) utter.voice = frVoice;

    utter.onstart = () => {
      body.classList.add('speaking');
      setStatus('RÉPONSE EN COURS');
    };
    utter.onend = () => {
      body.classList.remove('speaking');
      setStatus('SYSTÈME EN VEILLE');
    };
    utter.onerror = () => {
      body.classList.remove('speaking');
      setStatus('SYSTÈME EN VEILLE');
    };

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }

  // ---- Call Claude API ----
  async function askJarvis(userText) {
    const apiKey = getApiKey();
    if (!apiKey) {
      addLine('Jarvis', "Veuillez d'abord renseigner votre clé API via le bouton « CLÉ API » en haut de l'écran, monsieur.");
      openKeyModal();
      return;
    }

    setStatus('ANALYSE EN COURS...');
    conversation.push({ role: 'user', content: userText });

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversation
        })
      });

      const data = await response.json();

      if (!response.ok) {
        const apiMsg = (data && data.error && data.error.message) ? data.error.message : ('HTTP ' + response.status);
        throw new Error(apiMsg);
      }

      const textBlock = (data.content || []).find(b => b.type === 'text');
      const reply = textBlock ? textBlock.text : "Je n'ai pas pu formuler de réponse, monsieur.";

      conversation.push({ role: 'assistant', content: reply });
      addLine('Jarvis', reply);
      speak(reply);
    } catch (err) {
      body.classList.add('error');
      setStatus('ERREUR DE LIAISON AVEC LE SERVEUR');
      addLine('Jarvis', 'Erreur technique : ' + err.message);
      console.error('Jarvis API error:', err);
      setTimeout(() => { body.classList.remove('error'); setStatus('SYSTÈME EN VEILLE'); }, 4000);
    }
  }

  // Pre-load voices (Chrome quirk)
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
})();
</script>

</body>
</html>
